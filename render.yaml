services:
  - type: web
    name: realtor-analyzer
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180
    envVars:
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: SCRAPER_HEADLESS
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BUY_BOX_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_UNDERWRITING_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_RESEARCH_MODEL
        value: gpt-5.4-mini
      - key: WEBSHARE_API_KEY
        sync: false
      - key: WEBSHARE_PROXY_MODE
        value: direct
      - key: WEBSHARE_PROXY_COUNTRY_CODES
        value: CA,US
      - key: SCRAPER_PROXY_ENABLED
        value: "false"
      - key: SCRAPER_PROXY_SERVER
        sync: false
      - key: SCRAPER_PROXY_USERNAME
        sync: false
      - key: SCRAPER_PROXY_PASSWORD
        sync: false
